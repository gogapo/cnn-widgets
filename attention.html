<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attention schedule</title>

<style>
html,body{
margin:0;
padding:0;
background:#ffffff;
}

#cnn-attention-widget{
margin:0;
padding:0;
}
</style>

</head>

<body>

<div id="cnn-attention-widget">
<div id="svelte-app"></div>

<link rel="stylesheet" href="https://ix.cnn.io/dailygraphics/graphics/20260207-attention-span-schedule/assets/main-exS1okLC.css">
<script src="https://ix.cnn.io/dailygraphics/graphics/20260207-attention-span-schedule/assets/main-BSPffga8.js"></script>

</div>

<script>

(function(){

const root=document.getElementById("cnn-attention-widget");

const map={
"Click + drag the":"Arraste o",
"Click + drag":"Arraste",
"pink dot":"ponto cor-de-rosa",
"pink":"cor-de-rosa",
"most attentive":"mais atento",
"attentive":"atento",
"Focus peak":"Pico de concentração",
"Focus peak window":"Período de maior concentração",
"Low attention":"Baixa atenção",
"Low attention window":"Período de menor atenção",
"Break window":"Pausa",
"Start over":"Recomeçar",
"Next →":"Seguinte →",
"+ Add time block":"+ Adicionar período",
"break":"pausa"
};

function translateNode(node){

if(node.nodeType===3){

let txt=node.nodeValue;

for(const[en,pt]of Object.entries(map)){
txt=txt.replaceAll(en,pt);
}

node.nodeValue=txt;

}

node.childNodes.forEach(translateNode);

}

setInterval(function(){
translateNode(root);
},400);

})();

</script>


<script>

function sendHeight(){

var el=document.getElementById("cnn-attention-widget");

if(!el)return;

var h=el.offsetHeight;

parent.postMessage(
{attentionHeight:h},
"*"
);

}

window.addEventListener("load",sendHeight);
window.addEventListener("resize",sendHeight);

const observer=new MutationObserver(sendHeight);

observer.observe(
document.body,
{
childList:true,
subtree:true
}
);

setInterval(sendHeight,500);

</script>

</body>
</html>
